<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
// Generate PWA icons from canvas
const sizes = [192, 512];
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function draw(size) {
  canvas.width = size;
  canvas.height = size;
  const s = size / 512;

  // Background
  const bg = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  bg.addColorStop(0, '#13132B');
  bg.addColorStop(1, '#050510');
  ctx.fillStyle = bg;

  // Rounded rect
  const r = 96 * s;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Glow
  const glow = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, 200*s);
  glow.addColorStop(0, 'rgba(139,92,246,0.3)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);

  // Core
  const core = ctx.createRadialGradient(240*s, 240*s, 0, 256*s, 256*s, 80*s);
  core.addColorStop(0, '#8b5cf6');
  core.addColorStop(0.5, '#6d28d9');
  core.addColorStop(1, 'transparent');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(256*s, 256*s, 80*s, 0, Math.PI * 2);
  ctx.fill();

  // Bright center
  ctx.globalCompositeOperation = 'lighter';
  const bright = ctx.createRadialGradient(248*s, 248*s, 0, 248*s, 248*s, 20*s);
  bright.addColorStop(0, 'rgba(255,255,255,0.9)');
  bright.addColorStop(1, 'transparent');
  ctx.fillStyle = bright;
  ctx.beginPath();
  ctx.arc(248*s, 248*s, 20*s, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // Stars
  const stars = [[380,180,3,'#f59e0b'],[140,320,2,'#22d3ee'],[350,350,2.5,'#ec4899'],[180,150,2,'#f1f5f9'],[420,280,1.5,'#f1f5f9']];
  stars.forEach(([x,y,sz,c]) => {
    ctx.fillStyle = c;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(x*s, y*s, sz*s, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  return canvas.toDataURL('image/png');
}

sizes.forEach(size => {
  const dataUrl = draw(size);
  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = dataUrl;
  document.body.appendChild(link);
  link.textContent = `Download ${size}px icon`;
  link.style.display = 'block';
  link.style.margin = '10px';
});
</script>
</body>
</html>
