<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="LUMA — Break the loop. Defuse the thought. In under 60 seconds." />
  <meta name="theme-color" content="#050510" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LUMA" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@200;300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <title>LUMA — Cognitive Defusion Engine</title>
  <script type="module" crossorigin src="/assets/index-BeUGUOND.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B8OeYv7I.css">
<link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>

<body>
  <div id="luma-app">
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <canvas id="main-canvas" aria-hidden="true"></canvas>
    <canvas id="fx-canvas" aria-hidden="true"></canvas>

    <header id="app-title" aria-hidden="true">
      <h1>LUMA</h1>
      <p>Defuse the thought in under 60 seconds</p>
    </header>

    <main id="dump-container">
      <textarea id="dump-input" placeholder="Dump the thought exactly as it is..." spellcheck="false"
        autocomplete="off"></textarea>
      <button id="dump-release" aria-label="Release thought">
        <span>Release it</span>
      </button>
    </main>

    <section id="breathing-guide" class="hidden" aria-live="polite">
      <div id="breath-circle"></div>
      <p id="breath-label">Pause. Breathe.</p>
    </section>

    <section id="defusion-panel" class="hidden" aria-live="polite">
      <p id="defusion-text"></p>
    </section>

    <section id="session-end" class="hidden" aria-live="polite">
      <p id="session-end-text">Thought released.</p>
    </section>

    <aside id="controls-panel">
      <button id="btn-music" class="ctrl-btn active" title="Toggle Music" aria-label="Toggle music">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13" />
          <circle cx="6" cy="18" r="3" />
          <circle cx="18" cy="16" r="3" />
        </svg>
      </button>
      <button id="btn-volume" class="ctrl-btn" title="Cycle Volume" aria-label="Cycle volume">VOL</button>
      <button id="btn-mode" class="ctrl-btn" title="Change Music Mode" aria-label="Change music mode">MODE</button>
    </aside>
  </div>

</body>

</html>
