<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>
    <radialGradient id="core" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Orbits -->
  <ellipse cx="256" cy="256" rx="150" ry="60" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2" transform="rotate(-20 256 256)"/>
  <ellipse cx="256" cy="256" rx="120" ry="80" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.15" transform="rotate(30 256 256)"/>
  <!-- Stars -->
  <circle cx="380" cy="180" r="3" fill="#f59e0b" opacity="0.8"/>
  <circle cx="140" cy="320" r="2" fill="#22d3ee" opacity="0.6"/>
  <circle cx="350" cy="350" r="2.5" fill="#ec4899" opacity="0.7"/>
  <circle cx="180" cy="150" r="2" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="420" cy="280" r="1.5" fill="#f1f5f9" opacity="0.4"/>
  <!-- Core nebula -->
  <circle cx="256" cy="256" r="80" fill="url(#core)"/>
  <!-- Bright center -->
  <circle cx="240" cy="240" r="20" fill="white" opacity="0.7" filter="url(#blur)"/>
  <circle cx="248" cy="248" r="6" fill="white" opacity="0.9"/>
</svg>
